<div class="max-w-6xl mx-auto p-6 bg-white rounded shadow">

  <h2 class="text-2xl font-bold mb-4">Campaign Manager</h2>

  <!-- ERROR MESSAGE -->
  <div *ngIf="errorMessage" class="mb-3 text-red-600 font-medium">
    {{ errorMessage }}
  </div>

  <!-- FILTER -->
  <div class="mb-4 flex items-center gap-2">
    <label class="font-semibold">Filter:</label>
    <select [(ngModel)]="filterStatus" (change)="applyFilter()" class="border p-2 rounded">
      <option value="All">All</option>
      <option value="Upcoming">Upcoming</option>
      <option value="Active">Active</option>
      <option value="Completed">Completed</option>
    </select>
  </div>

  <!-- FORM -->
  <div class="border p-4 rounded mb-6">
    <h3 class="font-semibold mb-3">
      {{ isEditMode ? 'Edit Campaign' : 'Create Campaign' }}
    </h3>

    <div class="grid grid-cols-2 gap-4">

      <div>
        <label class="block text-sm font-medium">Page *</label>
        <select [(ngModel)]="campaign.pageId" class="border p-2 rounded w-full">
          <option value="">Select Page</option>
          <option *ngFor="let p of pages" [value]="p.id">{{ p.name }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium">Campaign Name *</label>
        <input type="text" [(ngModel)]="campaign.name" class="border p-2 rounded w-full"/>
      </div>

      <div>
        <label class="block text-sm font-medium">Budget *</label>
        <input type="number" [(ngModel)]="campaign.budget" class="border p-2 rounded w-full"/>
        <small *ngIf="campaign.budget <= 0" class="text-red-500">Budget must be greater than 0</small>
      </div>

      <div>
        <label class="block text-sm font-medium">Start Date *</label>
        <input type="date" [(ngModel)]="campaign.startDate" class="border p-2 rounded w-full"/>
      </div>

      <div>
        <label class="block text-sm font-medium">End Date *</label>
        <input type="date" [(ngModel)]="campaign.endDate" class="border p-2 rounded w-full"/>
        <small *ngIf="campaign.endDate && campaign.endDate < campaign.startDate" class="text-red-500">
          End date must be after start date
        </small>
      </div>

    </div>

    <div class="mt-4 flex gap-2">
      <button
        (click)="submitCampaign()"
        [disabled]="!isFormValid()"
        class="bg-blue-600 text-white px-4 py-2 rounded disabled:opacity-50"
      >
        {{ isEditMode ? 'Update' : 'Create' }}
      </button>

      <button
        *ngIf="isEditMode"
        (click)="resetForm()"
        class="bg-gray-400 text-white px-4 py-2 rounded"
      >
        Cancel
      </button>
    </div>
  </div>

  <!-- TABLE -->
  <table class="w-full border">
    <thead class="bg-gray-100">
      <tr>
        <th class="border p-2">Campaign</th>
        <th class="border p-2">Page</th>
        <th class="border p-2">Budget</th>
        <th class="border p-2">Status</th>
        <th class="border p-2">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let c of filteredCampaigns">
        <td class="border p-2">{{ c.name }}</td>
        <td class="border p-2">{{ getPageName(c.pageId) }}</td>
        <td class="border p-2">{{ c.budget }}</td>
        <td class="border p-2 font-semibold">{{ c.status }}</td>
        <td class="border p-2 space-x-2">
          <button class="text-blue-600" (click)="editCampaign(c)">Edit</button>
          <button class="text-red-600" (click)="deleteCampaign(c.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

</div>
